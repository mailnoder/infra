server {
    listen 80;
    server_name localhost;

    # Local dev upload/file size
    client_max_body_size 108M;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # MailWizz root (matches your container volume mount /var/www/html)
    root /var/www/html;
    index index.php index.html;
    charset UTF-8;

    # Static asset caching.
    #
    # Critical MailWizz exception: MailWizz outputs CSS/JS/image paths
    # that do NOT exist on disk and must be routed through the front
    # controller. We therefore cannot return 404 immediately. If the
    # asset does not exist as a real file, fall through to @rewrites.
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?)$ {
        try_files $uri @rewrites;
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Main route handling — MUST fall through to @rewrites so the
    # per-app front controllers below are evaluated.
    location / {
        try_files $uri $uri/ @rewrites;
    }

    # MailWizz rewrites (mirror the .htaccess files that ship
    # inside /api, /customer, /backend).
    location @rewrites {
        rewrite ^/api(/.*)?$      /api/index.php      last;
        rewrite ^/customer(/.*)?$ /customer/index.php last;
        rewrite ^/backend(/.*)?$  /backend/index.php  last;
        rewrite ^(.*)$            /index.php          last;
    }

    # PHP handling
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass mailwizz-php:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # MailWizz requires full host including port for correct redirects
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param SERVER_NAME $http_host;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param REQUEST_SCHEME $scheme;
        fastcgi_param HTTPS $https if_not_empty;

        # Helpful local debug
        fastcgi_param PHP_VALUE "display_errors=On \n error_reporting=E_ALL";

        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Block access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
