server {
    listen 80;
    server_name _;

    client_max_body_size 108M;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    root /var/www/html;
    index index.php index.html;
    charset UTF-8;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static asset caching.
    #
    # Critical MailWizz exception: MailWizz outputs CSS/JS/image paths
    # that do NOT exist on disk and must be routed through the front
    # controller. We therefore cannot return 404 immediately. If the
    # asset does not exist as a real file, fall through to @rewrites.
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?)$ {
        try_files $uri @rewrites;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # MailWizz runs four front controllers: /index.php (frontend),
    # /backend/index.php, /customer/index.php, /api/index.php.
    # Apache handles this via the .htaccess files shipped inside each
    # app directory. On nginx we must route to the correct front
    # controller explicitly — the try_files fallback MUST go to
    # @rewrites so those rewrites are actually evaluated.
    location / {
        try_files $uri $uri/ @rewrites;
    }

    location @rewrites {
        rewrite ^/api(/.*)?$      /api/index.php      last;
        rewrite ^/customer(/.*)?$ /customer/index.php last;
        rewrite ^/backend(/.*)?$  /backend/index.php  last;
        rewrite ^(.*)$            /index.php          last;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass mailwizz-php:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # MailWizz requires the full host including port to generate correct
        # absolute redirects. When the container is exposed on :8080, we must
        # pass the original Host header exactly as it was sent by the browser.
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param SERVER_NAME $http_host;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param REQUEST_SCHEME $scheme;
        fastcgi_param HTTPS $https if_not_empty;

        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
